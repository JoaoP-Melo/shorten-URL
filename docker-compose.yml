services:
  api:
    build: .
    container_name: fastapi_app

    command: sh -c "alembic upgrade head && uvicorn src.auth.router:app --host 0.0.0.0 --port 8000 --reload" 
      
    ports:
      - "8000:8000"

    volumes:
      - .:/src

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data: