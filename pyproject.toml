[tool.pytest.ini_options]
pythonpath = "."
addopts = "-p no:warnings"

[tool.ruff]
line-length = 79
exclude = ["alembic"]

[tool.ruff.lint]
preview = true
select = ['I', 'F', 'E', 'W', 'PL', 'PT']

[tool.ruff.format]
preview = true
quote-style = 'single'

[tool.taskipy.tasks]
api = "uvicorn src.auth.router:app --reload"
test = "pytest -vv"
lint = "ruff check ."
format = "ruff format ."




